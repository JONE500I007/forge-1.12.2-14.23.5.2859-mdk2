# Sets default memory used for gradle commands. Can be overridden by user or command line properties.
# This is required to provide enough memory for the Minecraft decompilation process.
org.gradle.jvmargs=-Xmx3G -Duser.language=en -Duser.country=US
org.gradle.daemon=false

# Increased network timeouts: this connection is slow (~470KB/s to Forge's maven),
# and the default Gradle socket timeout is too short for the large ForgeGradle artifacts.
systemProp.org.gradle.internal.http.connectionTimeout=180000
systemProp.org.gradle.internal.http.socketTimeout=180000
systemProp.http.socketTimeout=180000
systemProp.https.socketTimeout=180000
systemProp.http.connectionTimeout=180000
systemProp.https.connectionTimeout=180000